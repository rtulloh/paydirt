history: "The Minnesota Vikings were founded in 1961 as an AFL expansion team and joined the NFL in the 1970 merger. By 1972, they were a competitive team with a 7-7 record, featuring Hall of Fame quarterback Fran Tarkenton and a dominant defense known as the 'Purple People Eaters'."
