name: Build and Release Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyyaml

      - name: Run tests
        run: pytest --tb=short -v

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
            platform: linux
            arch: x86_64
          - os: windows-latest
            artifact: windows
            platform: windows
            arch: x86_64
          - os: macos-latest
            artifact: macos-arm64
            platform: macos
            arch: arm64
          - os: macos-26-intel
            artifact: macos-intel
            platform: macos
            arch: x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
       
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build frontend
        if: matrix.os != 'windows-latest'
        run: |
          cd paydirt-web/frontend
          npm install --legacy-peer-deps
          npm run build
          cd ../backend
          rm -rf web_static && cp -r ../frontend/dist web_static

      - name: Build frontend (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd paydirt-web/frontend
          npm install --legacy-peer-deps
          npm run build
          cd ../backend
          Remove-Item -Recurse -Force web_static -ErrorAction SilentlyContinue
          Copy-Item -Recurse ../frontend/dist web_static
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools==69.5.1 pyinstaller pyyaml typing_extensions uvicorn fastapi pydantic
       
      - name: Build executable
        run: |
          pyinstaller paydirt.spec --clean
          echo "Build output:"
          python -c "import os; print('Files in dist:', os.listdir('dist'))"
          echo "Build complete"
      
      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        continue-on-error: true
        run: |
          choco install nsis -y
        shell: pwsh
      
      - name: Create Windows installer
        if: matrix.os == 'windows-latest'
        continue-on-error: true
        run: |
          & 'C:\Program Files (x86)\NSIS\makensis.exe' packaging/windows/installer.nsi
      
      - name: Create macOS DMG
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-26-intel'
        run: |
          brew install create-dmg
          ./packaging/macos/create_app.sh
      
      - name: Create Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick squashfs-tools
          ./packaging/linux/create_appimage.sh
      
      - name: Upload warning file
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: warnings-${{ matrix.artifact }}
          path: build/*/warn-*.txt
          if-no-files-found: ignore

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: paydirt-linux
          path: dist/Paydirt-x86_64.AppImage
          if-no-files-found: error

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: paydirt-windows
          path: |
            dist/paydirt.exe
            dist/PaydirtSetup.exe
          if-no-files-found: error

      - name: Upload macOS ARM64 artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: paydirt-macos-arm64
          path: dist/Paydirt-*-arm64.dmg
          if-no-files-found: error

      - name: Upload macOS Intel artifact
        if: matrix.os == 'macos-26-intel'
        uses: actions/upload-artifact@v4
        with:
          name: paydirt-macos-intel
          path: dist/Paydirt-*-x86_64.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/paydirt-linux/Paydirt-x86_64.AppImage
            artifacts/paydirt-windows/paydirt.exe
            artifacts/paydirt-windows/PaydirtSetup.exe
            artifacts/paydirt-macos-arm64/*.dmg
            artifacts/paydirt-macos-intel/*.dmg
          draft: false
          body: |
            ## Downloads by Architecture
            
            ### macOS
            - **Paydirt-1.0.0-beta.40-arm64.dmg** - Apple Silicon (M1, M2, M3, M4)
            - **Paydirt-1.0.0-beta.40-x86_64.dmg** - Intel Mac
            
            ### Windows
            - **paydirt.exe** - Portable executable
            - **PaydirtSetup.exe** - Windows installer
            
            ### Linux
            - **Paydirt-x86_64.AppImage** - AppImage for Linux
            
            ## macOS Installation Note
            If you see "Paydirt is damaged and can't be opened":
            - Option 1: Right-click the app → Open → Click "Open" in the dialog
            - Option 2: Run in Terminal: `xattr -cr "/Applications/Paydirt.app"`
          token: ${{ secrets.GITHUB_TOKEN }}