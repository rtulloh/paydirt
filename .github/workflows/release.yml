name: Build and Release Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
            platform: linux
          - os: windows-latest
            artifact: windows
            platform: windows
          - os: macos-latest
            artifact: macos
            platform: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools==69.5.1 pyinstaller pyyaml typing_extensions
      
      - name: Build executable
        run: |
          pyinstaller paydirt.spec --clean
          echo "Build output:"
          python -c "import os; print('Files in dist:', os.listdir('dist'))"
          echo "Build complete"
      
      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        run: |
          choco install nsis -y
        shell: pwsh
      
      - name: Create Windows installer
        if: matrix.os == 'windows-latest'
        run: |
          & 'C:\Program Files (x86)\NSIS\makensis.exe' packaging/windows/installer.nsi
      
      - name: Create macOS DMG
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          ./packaging/macos/create_app.sh
      
      - name: Create Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick squashfs
          ./packaging/linux/create_appimage.sh
      
      - name: Upload warning file
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: warnings-${{ matrix.artifact }}
          path: build/*/warn-*.txt
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paydirt-${{ matrix.artifact }}
          path: dist/paydirt*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: artifacts/**/*